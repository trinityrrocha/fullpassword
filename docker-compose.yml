services:
  db:
    image: postgres:15-alpine
    container_name: fullpassword_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-fullpassword_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatória}
      POSTGRES_DB: ${DB_NAME:-fullpassword_db}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fullpassword_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullpassword_backend
    restart: always
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-fullpassword_user}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD obrigatória}
      - DB_NAME=${DB_NAME:-fullpassword_db}
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET obrigatória}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - ADMIN_BOOTSTRAP_TOKEN=${ADMIN_BOOTSTRAP_TOKEN:?ADMIN_BOOTSTRAP_TOKEN obrigatório}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-admin@admin.com.br}
      - APP_ORIGIN=${APP_ORIGIN:?APP_ORIGIN obrigatória}
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/opt/fullpassword # Mapeia a raiz do projeto para permitir o git pull
    networks:
      - fullpassword_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fullpassword_frontend
    restart: always
    expose:
      - "5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - ./.git:/opt/fullpassword/.git:ro
    networks:
      - fullpassword_network

  nginx:
    image: nginx:alpine
    container_name: fullpassword_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF_PATH:-./docker/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fullpassword_network

volumes:
  pgdata:

networks:
  fullpassword_network:
    driver: bridge
