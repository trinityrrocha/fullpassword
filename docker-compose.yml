version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fullpassword_db
    restart: always
    environment:
      POSTGRES_USER: fullpassword_user
      POSTGRES_PASSWORD: fullpassword_pass
      POSTGRES_DB: fullpassword_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fullpassword_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullpassword_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=fullpassword_user
      - DB_PASSWORD=fullpassword_pass
      - DB_NAME=fullpassword_db
      - NODE_ENV=development
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - fullpassword_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fullpassword_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - fullpassword_network

  nginx:
    image: nginx:alpine
    container_name: fullpassword_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - frontend
      - backend
    networks:
      - fullpassword_network

volumes:
  pgdata:

networks:
  fullpassword_network:
    driver: bridge
